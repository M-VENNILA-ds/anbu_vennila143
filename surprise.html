<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Beautiful Memories ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:#f6c1c7;
overflow:hidden;
}

h1{
color:#ff2e63;
margin-top:20px;
}

.message{
font-size:20px;
color:#c2185b;
margin-bottom:20px;
}

/* slider */

.slider{
width:100%;
overflow:hidden;
margin-top:20px;
}

.track{
display:flex;
gap:20px;
animation:scroll 30s linear infinite;
}

.slide{
width:260px;
height:360px;
flex-shrink:0;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* hearts */

.heart{
position:fixed;
top:-10px;
font-size:18px;
opacity:0.4;
z-index:-1;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

/* envelope */

.envelope{
position:fixed;
bottom:20px;
right:20px;
font-size:40px;
cursor:pointer;
}

/* love letter box */

.letter-box{
display:none;
position:fixed;
bottom:80px;
right:20px;
background:white;
padding:20px;
border-radius:12px;
width:260px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.letter-text{
font-size:15px;
color:#333;
margin-bottom:10px;
}

textarea{
width:100%;
height:60px;
border-radius:6px;
border:1px solid #ccc;
padding:5px;
}

button{
margin-top:8px;
padding:6px 10px;
border:none;
background:#ff4d6d;
color:white;
border-radius:6px;
cursor:pointer;
}

.reply{
margin-top:10px;
font-size:14px;
color:#444;
}

</style>
</head>

<body>

<h1>Our Beautiful Memories ❤️</h1>

<p class="message">
You are my today, my tomorrow and my forever ❤️
</p>

<!-- MUSIC -->

<audio autoplay loop>
<source src="Birthday_Surprise/music.mpeg" type="audio/mpeg">
</audio>

<!-- PHOTOS -->

<div class="slider">
<div class="track">

<div class="slide"><img src="Birthday_Surprise/photos/1699107581764.jpg"></div>
<div class="slide"><img src="Birthday_Surprise/photos/1709485231456.jpg"></div>
<div class="slide"><img src="Birthday_Surprise/photos/1761991722973 (1).jpg"></div>
<div class="slide"><img src="Birthday_Surprise/photos/IMG-20240117-WA0020.jpg"></div>
<div class="slide"><img src="Birthday_Surprise/photos/IMG-20250311-WA0057.jpg"></div>
<div class="slide"><img src="Birthday_Surprise/photos/IMG-20250323-WA0045.jpg"></div>
<div class="slide"><img src="Birthday_Surprise/photos/IMG-20260101-WA0043.jpg"></div>
<div class="slide"><img src="Birthday_Surprise/photos/Snapchat-1263862113.jpg"></div>

</div>
</div>

<!-- ENVELOPE -->

<div class="envelope" onclick="openLetter()">💌</div>

<!-- LETTER -->

<div class="letter-box" id="letterBox">

<div class="letter-text">
Happy Birthday my love ❤️  
You make my life beautiful.  
I’m lucky to have you forever.
</div>

<textarea id="replyText" placeholder="Write your reply..."></textarea>

<button onclick="saveReply()">Send</button>

<div class="reply" id="replyDisplay"></div>

</div>

<script>

/* open letter */

function openLetter(){
document.getElementById("letterBox").style.display="block";
}

/* save reply */

function saveReply(){

let text=document.getElementById("replyText").value;

localStorage.setItem("reply",text);

document.getElementById("replyDisplay").innerText="Reply: "+text;

}

/* show saved reply */

window.onload=function(){

let saved=localStorage.getItem("reply");

if(saved){
document.getElementById("replyDisplay").innerText="Reply: "+saved;
}

}

/* hearts */

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(createHeart,800);

</script>

</body>
</html>
